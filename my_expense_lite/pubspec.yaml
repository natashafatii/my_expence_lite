name: my_expense_lite
description: "A simple offline expense tracker"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.0.5
  intl: ^0.20.2
  fl_chart: ^0.68.0
  uuid: ^3.0.7
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/images/profile.png